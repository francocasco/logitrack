<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LogiTrack — Iniciar sesión</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
    }

    .login-box {
      width: 100%;
      max-width: 400px;
      padding: 0 20px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo .icon { font-size: 36px; margin-bottom: 8px; }

    .login-logo h1 {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.1em;
    }

    .login-logo p {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 4px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }

    .login-card h2 {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 24px;
    }

    .btn-login {
      width: 100%;
      justify-content: center;
      padding: 11px;
      font-size: 14px;
      margin-top: 8px;
    }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-box">

      <div class="login-logo">
        <div class="icon">📦</div>
        <h1>LogiTrack</h1>
        <p>Sistema de gestión logística</p>
      </div>

      <div class="login-card">
        <h2>Iniciar sesión</h2>

        <div id="alert-login" class="alert"></div>

        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="tu@email.com" autocomplete="email" />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
        </div>

        <button id="btn-login" class="btn btn-primary btn-login" onclick="iniciarSesion()">
          Ingresar →
        </button>
      </div>

      <div class="login-footer">LogiTrack MVP · Acceso restringido</div>

    </div>
  </div>

  <div class="login-footer">
  ¿No tenés cuenta?
  <a href="/register.html" style="color:var(--accent); text-decoration:none;">Crear cuenta</a>
  </div>


  <script>
    // Si ya tiene sesión, redirigir al sistema
    const token = localStorage.getItem('logitrack_token');
    if (token) {
      fetch('/api/auth/verificar', {
        headers: { 'Authorization': `Bearer ${token}` }
      }).then(res => {
        if (res.ok) window.location.href = '/';
      });
    }

    function showAlert(msg, tipo = 'error') {
      const el = document.getElementById('alert-login');
      el.className = `alert alert-${tipo} show`;
      el.textContent = msg;
    }

    async function iniciarSesion() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('btn-login');

      if (!email || !password) {
        showAlert('El email y la contraseña son obligatorios.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Ingresando...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          showAlert(data.error);
          return;
        }

        localStorage.setItem('logitrack_token', data.token);
        window.location.href = '/';

      } catch {
        showAlert('No se pudo conectar con el servidor.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Ingresar →';
      }
    }

    // Ingresar con Enter
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') iniciarSesion();
    });
  </script>
</body>
</html>
