name: CI

on:
  push:
    branches:
      - main
      - development
      - pipeline

  pull_request:
    branches:
      - main
      - development
      - pipeline

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test